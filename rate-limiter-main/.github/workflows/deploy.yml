name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 16
        cache: 'npm'
        cache-dependency-path: rate-limiter-main/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      working-directory: ./rate-limiter-main
      
    - name: Build project
      run: npm run build
      working-directory: ./rate-limiter-main
      
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: rate-limiter-main/build
        branch: gh-pages 